<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In · BossQuest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/frontend/css/style.css" />
  <link rel="stylesheet" href="/frontend/css/auth.css" />
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-owl">🦉</span><span class="logo-text">BossQuest</span>
      </div>
      <h1 class="auth-title">Welcome back!</h1>
      <p class="auth-sub">Log in to keep fighting.</p>

      {{error}}

      <form method="post" action="/login" class="auth-form">
        <label class="field">
          <span class="field-label">Username</span>
          <input class="field-input" type="text" name="username" placeholder="admin" autocomplete="username" autofocus required />
        </label>
        <label class="field">
          <span class="field-label">Password</span>
          <input class="field-input" type="password" name="password" placeholder="••••••" autocomplete="current-password" required />
        </label>
        <button class="btn btn-green btn-block" type="submit">Log In</button>
      </form>

      <p class="auth-foot">New here? <a href="/register">Create an account</a></p>
      <div class="demo-hint">🔑 Demo login — <b>admin</b> / <b>admin</b></div>
    </div>
  </div>
</body>
</html>
